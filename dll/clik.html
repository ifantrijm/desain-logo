<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Like Counter</title>
  <style>
    .gambar-container {
      position: relative;
      display: inline-block;
      margin: 10px;
    }

    .gambar-container img {
      max-width: 300px;
      height: auto;
    }

    .likeButton {
      position: absolute;
      top: 10px;
      right: 10px;
      border: none;
      font-size: 15px;
      border-radius: 5px;
      cursor: pointer;
      background-color: transparent;
    }

    .likeCount {
      position: absolute;
      color: white;
      top: 10px;
      right: 50px;
      font-size: 20px;
    }

    .deleteButton {
      position: absolute;
      top: 10px;
      right: 90px;
      background-color: #ff4d4d;
      color: white;
      padding: 5px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="gambar-container">
  <img src="img/log_bisnis/green.png" alt="Gambar 1">
  <button class="likeButton">⭐</button>
  <span class="likeCount">0</span>
  <!-- <button class="deleteButton">Delete</button> -->
</div>

<div class="gambar-container">
  <img src="img/log_bisnis/green.png" alt="Gambar 2">
  <button class="likeButton">⭐</button>
  <span class="likeCount">0</span>
  <!-- <button class="deleteButton">Delete</button> -->
</div>

<div class="gambar-container">
  <img src="img/log_bisnis/green.png" alt="Gambar 3">
  <button class="likeButton">⭐</button>
  <span class="likeCount">0</span>
  <!-- <button class="deleteButton">Delete</button> -->
</div>

<div class="gambar-container">
  <img src="img/log_bisnis/green.png" alt="Gambar 4">
  <button class="likeButton">⭐</button>
  <span class="likeCount">0</span>
  <!-- <button class="deleteButton">Delete</button> -->
</div>

<div class="gambar-container">
  <img src="img/log_bisnis/green.png" alt="Gambar 5">
  <button class="likeButton">⭐</button>
  <span class="likeCount">0</span>
  <!-- <button class="deleteButton">Delete</button> -->
</div>

<!-- Add more gambar-container for additional images -->

<script>
  document.addEventListener("DOMContentLoaded", function() {
    // Ambil semua elemen tombol like, like count, dan delete button
    var likeButtons = document.querySelectorAll(".likeButton");
    var likeCounts = document.querySelectorAll(".likeCount");
    var deleteButtons = document.querySelectorAll(".deleteButton");

    // Inisialisasi jumlah like dari local storage untuk setiap gambar
    for (var i = 0; i < likeCounts.length; i++) {
      var initialLikes = localStorage.getItem("likes_" + i);
      if (initialLikes) {
        likeCounts[i].textContent = initialLikes;
      }
    }

    // Tambahkan event listener untuk setiap tombol like
    likeButtons.forEach(function(button, index) {
      button.addEventListener("click", function() {
        // Ambil jumlah like saat ini
        var currentLikes = parseInt(likeCounts[index].textContent);

        // Tambah 1 ke jumlah like
        currentLikes++;

        // Update tampilan jumlah like
        likeCounts[index].textContent = currentLikes;

        // Simpan jumlah like ke local storage
        localStorage.setItem("likes_" + index, currentLikes);
      });
    });

    // Tambahkan event listener untuk setiap tombol delete
    deleteButtons.forEach(function(button, index) {
      button.addEventListener("click", function() {
        // Ambil jumlah like saat ini
        var currentLikes = parseInt(likeCounts[index].textContent);

        // Pastikan jumlah like tidak menjadi negatif
        if (currentLikes > 0) {
          // Kurangi 1 dari jumlah like
          currentLikes--;

          // Update tampilan jumlah like
          likeCounts[index].textContent = currentLikes;

          // Simpan jumlah like ke local storage
          localStorage.setItem("likes_" + index, currentLikes);
        }
      });
    });
  });
</script>

</body>
</html>
